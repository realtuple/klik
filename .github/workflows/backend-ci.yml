name: Backend CI

on:
    pull_request:
    push:
        branches: [master]

jobs:
    checks:
        runs-on: ubuntu-latests
        steps:
            - uses: actions/checkout@v4
            - uses: ashivammathur/setup-php@v2
              with:
                  node-version: 8.5
                  extensions: mbstring, intl
                  coverage: none
            - run: composer install --prefer-dist --no-progress
            - run: ./vendor/bin/phpstan analyse # Runs linter
            - run: ./vendor/bin/pint --test # Runs formatter
            - run: php artisan test # Runs tests
